# Font (kept yours)
font_family      Hack Nerd Font Mono
bold_font        Hack Nerd Font Mono Bold
italic_font      Hack Nerd Font Mono Italic
bold_italic_font Hack Nerd Font Mono Bold Italic
font_size        12.0

# Theme - Catppuccin Mocha (kept yours)
background #1e1e2e
foreground #cdd6f4
selection_background #585b70
selection_foreground #cdd6f4
url_color #f5e0dc
cursor #f5e0dc
cursor_text_color #1e1e2e
active_border_color #b4befe
inactive_border_color #6c7086
bell_border_color #f9e2af
wayland_titlebar_color #1e1e2e
macos_titlebar_color #1e1e2e
active_tab_foreground #cdd6f4
active_tab_background #1e1e2e
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background #11111b

color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
color16 #fab387
color17 #f5e0dc

# Window
remember_window_size  yes
initial_window_width  640
initial_window_height 400
confirm_os_window_close 0

# Padding / Margin
single_window_margin_width 20
window_border_width 0.5pt
draw_minimal_borders yes
placement_strategy center

# Tab bar
tab_bar_edge bottom
tab_bar_style fade
tab_separator " ┇"
tab_fade 0.25 0.5 0.75 1
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_min_tabs 2
tab_switch_strategy previous
active_tab_font_style   bold-italic
inactive_tab_font_style normal

# Scrollback
scrollback_lines 2000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Mouse
mouse_hide_wait 3.0
url_style curly
url_prefixes http https file ftp gemini irc gopher mailto news git
detect_urls yes
copy_on_select no
strip_trailing_spaces never
focus_follows_mouse no

# Cursor
cursor_shape block
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval -1
cursor_stop_blinking_after 15.0

# Bell
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Advanced
shell .
allow_remote_control no
clipboard_control write-clipboard write-primary
allow_hyperlinks yes
term xterm-kitty

# Shortcuts
map ctrl+shift+f toggle_fullscreen
